<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b5ce0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>

  <!-- Sound waves — left -->
  <path d="M 62 46 Q 46 65 62 84"
        fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 49 34 Q 26 65 49 96"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Sound waves — right -->
  <path d="M 138 46 Q 154 65 138 84"
        fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 151 34 Q 174 65 151 96"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Mic capsule body -->
  <rect x="73" y="20" width="54" height="84" rx="27" fill="white" opacity="0.96"/>

  <!-- Mic grille lines (subtle, inside capsule) -->
  <line x1="86"  y1="46" x2="114" y2="46" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="84"  y1="57" x2="116" y2="57" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="84"  y1="68" x2="116" y2="68" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="85"  y1="79" x2="115" y2="79" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>

  <!-- Mic stand arc (U-shape from capsule base down to nib) -->
  <path d="M 73 92 Q 56 124 100 132 Q 144 124 127 92"
        fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round" opacity="0.92"/>

  <!-- ── Pen nib replacing the flat base ── -->
  <!-- Nib shoulders -->
  <path d="M 80 132 L 120 132 L 100 168 Z" fill="white" opacity="0.93"/>
  <!-- Nib centre split (gives it the pen-nib look) -->
  <line x1="100" y1="135" x2="100" y2="163"
        stroke="#3b5ce0" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- Ink drop at the tip -->
  <circle cx="100" cy="174" r="5.5" fill="white" opacity="0.6"/>
</svg>
